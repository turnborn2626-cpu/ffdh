<!DOCTYPE html>
<html>
<head>
    <title>Videy - Video Preview</title>
    <meta name="description" content="Preview your video">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w==" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@200;300;400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="./style.css">
</head>
<body>
    <div class="nav-outer">
        <div class="nav-inner">
            <div class="logo-text">
                <a href="https://sazumi.moe/">videy</a>
            </div>
            <a href="/">
                <div class="upload-button-nav">
                    Upload
                </div>
            </a>
            <div class="legal">
                <div class="legal-menu">
                    <a href="javascript:void(0);" class="icon" onclick="toggleMobileNavbar()">
                        <i class="fa fa-bars"></i>
                    </a>
                </div>
                <div class="legal-item">
                    <a href="/">
                        Privacy Policy
                    </a>
                </div>
                <div class="legal-item">
                    <a href="/">
                        Terms of Service
                    </a>
                </div>
                <div class="legal-item">
                    <a>
                        Abuse
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div id="mobile-menu">
        <a href="/">
            Privacy Policy
        </a>
        <a href="/">
            Terms of Service
        </a>
        <a>
            Abuse
        </a>
    </div>
    <div class="body">
        <div class="main-area">
            <div class="video">
                <video controls id="previewVideo">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>
    <footer>
        <p>© Sazumi Cloud. All rights reserved.</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js" integrity="sha512-bLT0Qm9VnAYZDflyKcBaQ2gg0hSYNQrJ8RilYldYQ1FxQYoCLtUjuuRuZo+fjqhx/qtq/1itJ0C2ejDxltZVFg==" crossorigin="anonymous"></script>
    <script src="./index.js"></script>
    <script>
      const video        = document.getElementById("video");
      const videoError   = document.getElementById("video-error");
      const videoActions = document.querySelector(".video-actions");
      const clickLayer   = document.getElementById("firstClickLayer");
      const id           = "";
      const base         = "https://cdn.videy.co/" + id;

      function loadVideo(src){
        video.src = src;
        video.load();
      }

      loadVideo(base + ".mp4");

      video.onerror = function () {
        if (!video.dataset.triedMov) {
          video.dataset.triedMov = "1";
          loadVideo(base + ".mov");
        } else {
          video.style.display        = "none";
          videoError.style.display   = "block";
          videoActions.style.display = "none";
          if (clickLayer) clickLayer.style.display = "none";
        }
      };

      video.oncanplay = function () {
        videoError.style.display    = "none";
        video.style.display         = "block";
        videoActions.style.display  = "flex";
      };

      (function(){
        const layer = document.getElementById('firstClickLayer');
        const directLink = "#";

        if (!layer || !directLink || directLink === '#') {
          if (layer) layer.remove();
          return;
        }

        layer.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.open(directLink, '_blank');
          layer.remove();
        }, { once: true });
      })();
    </script>
    <script>
      $(function(){
        $('#copyUrl').on('click',function(){
          navigator.clipboard.writeText(window.location.href).then(function(){
            const t = $(this).text();
            $(this).text('Copied!');
            setTimeout(()=>$(this).text(t),2000);
          }.bind(this));
        });

        $('#uploadVideo').on('click',function(){
          window.location.href='/';
        });
      });
    </script>
</body>
</html>
